version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: crypto
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d crypto"]
      interval: 5s
      timeout: 2s
      retries: 12

  ollama:
    image: ghcr.io/ollama/ollama:latest
    restart: unless-stopped
    # Note: Ollama container may require additional setup/volumes depending on your usage
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:11434/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    build: ./server
    command: npm run dev
    working_dir: /app
    volumes:
      - ./server:/app:delegated
      - /app/node_modules
    environment:
      - DATABASE_URL=postgres://dev:dev@db:5432/crypto
      - OLLAMA_URL=http://ollama:11434
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "5000:5000"
    tty: true

networks:
  default:
    driver: bridge
